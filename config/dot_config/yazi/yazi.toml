[mgr]
linemode = "mtime"

[[plugin.prepend_fetchers]]
id = "git"
name = "*"
run = "git"

[[plugin.prepend_fetchers]]
id = "git"
name = "*/"
run = "git"

[[plugin.prepend_previewers]]
url = "*.mbt"
run = 'piper -- bat -p --color=always "$1"'

[[plugin.prepend_previewers]]
url = "*.mbti"
run = 'piper -- bat -p --color=always "$1"'

# Show `git diff` (via delta) for files in the `git-files` view; fall back to
# the normal previewer elsewhere (see plugins/git-diff.yazi).
[[plugin.prepend_previewers]]
mime = "text/*"
run = "git-diff"

[[plugin.prepend_previewers]]
mime = "application/{json,ndjson}"
run = "git-diff json"

[opener]
treemd = [{ run = "treemd %s1", block = true, for = "unix", desc = "Treemd" }]
glow = [{ run = 'glow -p "$1"', block = true, for = "unix", desc = "Glow" }]

[open]
prepend_rules = [{ url = "*.md", use = ["edit", "reveal", "treemd", "glow"] }]
