[mgr]
linemode = "mtime"

[[plugin.prepend_fetchers]]
id = "git"
name = "*"
run = "git"

[[plugin.prepend_fetchers]]
id = "git"
name = "*/"
run = "git"

[[plugin.prepend_previewers]]
url = "*.mbt"
run = 'piper -- bat -p --color=always "$1"'

[[plugin.prepend_previewers]]
url = "*.mbti"
run = 'piper -- bat -p --color=always "$1"'

[opener]
treemd = [{ run = "treemd %s1", block = true, for = "unix", desc = "Treemd" }]

[open]
prepend_rules = [{ url = "*.md", use = ["edit", "reveal", "treemd"] }]
