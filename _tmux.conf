# Use c-b instead of c-b as the prefix
unbind C-b
set -g prefix C-y
bind C-y send-prefix

# set -g status-right "#(date)"
set -g status-left-length 30

# Statusbar properties.
set -g display-time 3000

setw -g mode-keys vi
setw -g automatic-rename off
setw -g mouse off

set -g repeat-time 10000

set -sg escape-time 0

# prefix + r で設定ファイルを再読み込み
unbind r
bind r source-file ~/.tmux.conf

unbind ^"["
bind -r ^"[" copy-mode
unbind ^]
bind -r ^] paste-buffer

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
unbind-key -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

unbind p
unbind o
unbind n
bind -r o select-pane -t :.+
bind -r n next-window
bind -r p previous-window

bind s setw synchronize-panes on
bind S setw synchronize-panes off

bind C-v select-layout -t: even-vertical
bind C-h select-layout -t: even-horizontal
bind C-t select-layout -t: tiled

set -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"


#### COLOUR (Solarized light) {{{

# default statusbar colors
set-option -g status-bg colour231 #base2
set-option -g status-fg colour130 #yellow
set-option -g status-attr default

# default window title colors
set-window-option -g window-status-fg colour180 #base00
set-window-option -g window-status-bg default
#set-window-option -g window-status-attr dim

# active window title colors
set-window-option -g window-status-current-fg colour196 #orange
set-window-option -g window-status-current-bg default
#set-window-option -g window-status-current-attr bright

# pane border
set-option -g pane-border-fg colour231 #base2
set-option -g pane-active-border-fg colour051 #base1

# message text
set-option -g message-bg colour231 #base2
set-option -g message-fg colour196 #orange

# pane number display
set-option -g display-panes-active-colour colour20 #blue
set-option -g display-panes-colour colour196 #orange

# clock
set-window-option -g clock-mode-colour colour40 #green

#}}}
#### plugins {{{
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'nhdaly/tmux-scroll-copy-mode'
run '~/.tmux/plugins/tpm/tpm'
#}}}
# vim: ft=tmux
